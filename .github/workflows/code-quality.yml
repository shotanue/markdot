name: Code quality

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup mise
        uses: jdx/mise-action@v2
      - run: rustup component add clippy
      - run: cargo clippy -- -D warnings
      - run: cargo test
