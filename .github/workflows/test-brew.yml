name: Brew Test

on:
  push:
    paths:
      - 'src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/test-brew.yml'
  workflow_dispatch:

jobs:
  test-brew:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup mise
        uses: jdx/mise-action@v2
      - name: Build Markdot
        run: cargo build --release
      - name: Create Test Brewfile Markdown
        run: |
          cat <<EOF > test_brew.md
          # Brew Test

          \`\`\`brewfile
          brew "hello"
          \`\`\`
          EOF
      - name: Run Markdot
        run: ./target/release/markdot test_brew.md
      - name: Verify Installation
        run: brew list hello
