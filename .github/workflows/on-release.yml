name: On release

on:
  push:
    tags:
      - '*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build (${{ matrix.asset_name }})
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            asset_name: markdot-linux-amd64
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-musl
            asset_name: markdot-linux-amd64-musl
            deps: musl-tools
          - os: ubuntu-24.04
            target: aarch64-unknown-linux-gnu
            asset_name: markdot-linux-arm64
            use_cross: true
          - os: ubuntu-24.04
            target: aarch64-unknown-linux-musl
            asset_name: markdot-linux-arm64-musl
            use_cross: true
          - os: macos-15-intel
            target: x86_64-apple-darwin
            asset_name: markdot-darwin-amd64
          - os: macos-15
            target: aarch64-apple-darwin
            asset_name: markdot-darwin-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: Install system deps
        if: matrix.deps
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.deps }}
      - run: rustup target add ${{ matrix.target }}
      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross
      - name: Build
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi
      - name: Upload binaries to release
        uses: svenstaro/upload-release-action@2.11.4
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: target/${{ matrix.target }}/release/markdot
          asset_name: ${{ matrix.asset_name }}
          tag: ${{ github.ref }}
          overwrite: true
